name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test
        run: ./gradlew build
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
